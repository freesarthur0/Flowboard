<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="description" content="FlowBoard — Gerenciador de tarefas Kanban visual com Supabase, lembretes, timeline e múltiplos quadros.">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⌘</text></svg>">
<link rel="manifest" href="manifest.json">
<title>FlowBoard</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">

<!-- CSS modular -->
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/layout.css">
<link rel="stylesheet" href="css/mobile.css">
<link rel="stylesheet" href="css/components.css">
<link rel="stylesheet" href="css/reminders.css">
<link rel="stylesheet" href="css/timeline.css">
</head>
<body>

<!-- LOADING -->
<div class="loading-screen" id="loading-screen">
  <div class="skeleton-bg">
    <div class="skeleton-sidebar-ph">
      <div style="padding:16px 11px;display:flex;flex-direction:column;gap:14px">
        <div class="skeleton-block" style="width:30px;height:30px;border-radius:8px"></div>
        <div class="skeleton-block" style="height:8px;width:80%;border-radius:4px"></div>
        <div class="skeleton-block" style="height:8px;width:60%;border-radius:4px"></div>
        <div class="skeleton-block" style="height:8px;width:72%;border-radius:4px"></div>
      </div>
    </div>
    <div class="skeleton-main-ph">
      <div class="skeleton-topbar-ph"></div>
      <div class="skeleton-board-ph">
        <div class="skeleton-col-ph"><div class="skeleton-block" style="height:46px"></div><div class="skeleton-block" style="height:100px"></div><div class="skeleton-block" style="height:72px"></div><div class="skeleton-block" style="height:88px"></div></div>
        <div class="skeleton-col-ph"><div class="skeleton-block" style="height:46px"></div><div class="skeleton-block" style="height:84px"></div><div class="skeleton-block" style="height:118px"></div></div>
        <div class="skeleton-col-ph"><div class="skeleton-block" style="height:46px"></div><div class="skeleton-block" style="height:110px"></div><div class="skeleton-block" style="height:64px"></div></div>
        <div class="skeleton-col-ph"><div class="skeleton-block" style="height:46px"></div><div class="skeleton-block" style="height:76px"></div></div>
        <div class="skeleton-col-ph"><div class="skeleton-block" style="height:46px"></div><div class="skeleton-block" style="height:92px"></div><div class="skeleton-block" style="height:80px"></div></div>
      </div>
    </div>
  </div>
  <div class="loading-center">
    <div class="loading-logo">Flow<span>Board</span></div>
    <div class="loading-sub" id="loading-sub">Conectando…</div>
    <div class="loading-bar-bg"><div class="loading-bar"></div></div>
  </div>
</div>

<!-- ══════════ DESKTOP ══════════ -->
<div class="desktop" id="desktop-layout" style="display:none">

  <!-- SIDEBAR ESQUERDA (colapsável via hover, fixável com pin) -->
  <div class="sidebar" id="d-sidebar">
    <div class="sidebar-inner">

      <div class="sidebar-logo">
        <div class="logo-mark">⌘</div>
        <div class="sidebar-logo-text">
          <div class="logo-text">FlowBoard</div>
          <div class="logo-sub">Desktop</div>
        </div>
        <div class="sync-dot" id="d-sync-dot"></div>
        <button class="sidebar-pin-btn" id="sidebar-pin-btn" onclick="toggleSidebarPin()" title="Fixar sidebar">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="12" y1="17" x2="12" y2="22"/><path d="M5 17h14v-1.76a2 2 0 0 0-1.11-1.79l-1.78-.9A2 2 0 0 1 15 10.76V6h1a2 2 0 0 0 0-4H8a2 2 0 0 0 0 4h1v4.76a2 2 0 0 1-1.11 1.79l-1.78.9A2 2 0 0 0 5 15.24Z"/></svg>
        </button>
      </div>

      <div class="sidebar-section">
        <div class="sidebar-label">Quadros</div>
        <div id="d-boards-list"></div>
        <button class="add-board-btn-d" onclick="openBoardModal()">
          <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          <span>Novo quadro</span>
        </button>
      </div>

      <div class="sidebar-bottom">
        <button class="sidebar-action" onclick="openQuickAdd()">
          <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M13 2 3 14h7l-1 8 10-12h-7z"/></svg>
          <span>Entrada rápida</span>
        </button>
        <button class="sidebar-action" onclick="exportBackupJSON()">
          <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          <span>Backup JSON</span>
        </button>
        <button class="sidebar-action" onclick="triggerImportBackup()">
          <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
          <span>Restaurar JSON</span>
        </button>
        <button class="sidebar-action" onclick="exportXLSX()">
          <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M3 15h18M9 3v18"/></svg>
          <span>Exportar Excel</span>
        </button>
      </div>

    </div>
  </div>
  <div class="d-main">
    <div class="topbar">
      <input class="board-title-input" id="d-board-title" value="" onchange="renameBoard(this.value)">
      <div class="topbar-sep"></div>
      <div class="view-tabs">
        <button class="view-tab active" id="d-tab-kanban" onclick="setDView('kanban')">
          <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="5" height="18" rx="1"/><rect x="10" y="3" width="5" height="12" rx="1"/><rect x="17" y="3" width="4" height="16" rx="1"/></svg>Kanban
        </button>
        <button class="view-tab" id="d-tab-notes" onclick="setDView('notes')">
          <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="8" y1="13" x2="16" y2="13"/><line x1="8" y1="17" x2="13" y2="17"/></svg>Anotações
        </button>
        <button class="view-tab" id="d-tab-stats" onclick="setDView('stats')">
          <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>Stats
        </button>
        <button class="view-tab" id="d-tab-timeline" onclick="setDView('timeline')">
          <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="14" y2="12"/><line x1="3" y1="18" x2="10" y2="18"/><rect x="14" y="9" width="7" height="6" rx="1"/></svg>Timeline
        </button>
        <button class="view-tab" id="d-tab-today" onclick="setDView('today')">
          <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/><polyline points="9 14 11 16 15 12"/></svg>Meu Dia
        </button>
      </div>
      <div class="topbar-sep"></div>
      <div class="gsearch-wrap" id="gsearch-wrap">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input class="gsearch-input" id="d-search" type="text" placeholder="Buscar em todos os quadros… (/)" oninput="onGSearch(this.value)" onfocus="onGSearch(this.value)" onblur="setTimeout(()=>closeGSearch(),200)" autocomplete="off">
        <div class="gsearch-dropdown" id="gsearch-dropdown"></div>
      </div>
      <button class="filter-btn" id="d-filter-btn" onclick="toggleDFilter()">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>Filtrar
      </button>

    </div>
    <div class="stats-strip" id="d-stats-strip"></div>
    <div class="filter-bar" id="d-filter-bar">
      <span class="filter-label">Prioridade:</span>
      <button class="fpill fpill-alta" onclick="toggleDFilterPri('alta')">Alta</button>
      <button class="fpill fpill-media" onclick="toggleDFilterPri('media')">Média</button>
      <button class="fpill fpill-baixa" onclick="toggleDFilterPri('baixa')">Baixa</button>
      <div style="width:1px;height:16px;background:var(--border);margin:0 4px"></div>
      <button class="fpill" id="d-fpill-overdue" onclick="toggleDFilterSpec('overdue')">Vencidas</button>
      <button class="fpill" id="d-fpill-today" onclick="toggleDFilterSpec('today')">Hoje</button>
      <div id="d-filter-tags" style="display:flex;gap:4px;"></div>
      <div id="d-filter-efforts" style="display:flex;gap:4px;"></div>
      <div id="d-filter-assignees" style="display:flex;gap:4px;"></div>
      <button class="filter-clear" onclick="clearDFilters()">Limpar</button>
    </div>
    <div class="board-area" id="d-board-area">
      <div id="d-kanban-view"><div class="board" id="d-board"></div></div>
      <div class="notes-view obsd" id="d-notes-view">
        <div class="obsd-tree-pane">
          <div class="obsd-tree-head">
            <button class="obsd-icon-btn" onclick="createNote()" title="Nova anotação (Ctrl+N)">
              <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="11" x2="12" y2="17"/><line x1="9" y1="14" x2="15" y2="14"/></svg>
            </button>
            <button class="obsd-icon-btn" onclick="createFolderPrompt()" title="Nova pasta">
              <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/><line x1="12" y1="11" x2="12" y2="17"/><line x1="9" y1="14" x2="15" y2="14"/></svg>
            </button>
            <button class="obsd-icon-btn" onclick="collapseAllFolders()" title="Recolher tudo">
              <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="4 14 10 14 10 20"/><polyline points="20 10 14 10 14 4"/></svg>
            </button>
            <div style="flex:1"></div>
            <select id="d-notes-scope" class="obsd-scope" onchange="setNoteScope(this.value)" title="Escopo">
              <option value="all">Todas</option>
              <option value="board">Quadro</option>
              <option value="global">Globais</option>
            </select>
          </div>
          <div class="obsd-search-wrap">
            <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
            <input id="d-notes-search" class="obsd-search" placeholder="Buscar…" oninput="onNotesSearch(this.value)">
          </div>
          <div class="obsd-tree" id="d-notes-tree"></div>
        </div>
        <div class="obsd-main-pane">
          <div class="obsd-tabs" id="d-notes-tabs"></div>
          <div class="obsd-editor-wrap" id="d-notes-editor"></div>
          <div class="obsd-statusbar" id="d-notes-statusbar"></div>
        </div>
        <div class="obsd-outline-pane">
          <div class="obsd-outline-head">Outline</div>
          <div class="obsd-outline" id="d-notes-outline"></div>
          <div class="obsd-outline-head" style="margin-top:18px;">Tags</div>
          <div class="obsd-outline-tags" id="d-notes-tagcloud"></div>
        </div>
      </div>
      <div class="timeline-view" id="d-timeline-view"></div>
      <div class="today-view" id="d-today-view"></div>
      <div class="stats-view" id="d-stats-view">
        <div class="stats-tabs">
          <button class="stats-tab active" id="stab-stats" onclick="setStatsTab('stats')">
            <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="display:inline;vertical-align:middle;margin-right:5px"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>Estatísticas
          </button>
          <button class="stats-tab" id="stab-archive" onclick="setStatsTab('archive')">
            <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="display:inline;vertical-align:middle;margin-right:5px"><polyline points="21 8 21 21 3 21 3 8"/><rect x="1" y="3" width="22" height="5"/><line x1="10" y1="12" x2="14" y2="12"/></svg>Arquivados
          </button>
        </div>
        <div class="stats-panel active" id="spanel-stats">
          <div class="stats-grid" id="d-stats-cards"></div>
          <div class="stats-charts-grid">
            <div class="weekly-chart"><div class="weekly-chart-title">Concluídas — 7 dias</div><div class="chart-bars" id="d-weekly-bars"></div></div>
            <div class="weekly-chart"><div class="weekly-chart-title">Distribuição por prioridade</div><div class="pri-dist" id="d-pri-dist"></div></div>
          </div>
        </div>
        <div class="stats-panel" id="spanel-archive">
          <div id="d-archive-content2"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- PAINEL DIREITO (Calendário + Lembretes — fixo) -->
  <div class="right-panel" id="right-panel">
    <div class="rp-content">

      <!-- Calendário -->
      <div class="sidebar-cal" id="sidebar-cal">
        <div class="cal-head">
          <span class="cal-title">Calendário</span>
          <div class="cal-nav">
            <button class="cal-nav-btn" onclick="calNav(-1)">‹</button>
            <button class="cal-nav-btn" onclick="calNav(1)">›</button>
          </div>
        </div>
        <div id="cal-month-label" class="cal-month"></div>
        <div class="cal-grid" id="cal-grid"></div>
      </div>

      <!-- Lembretes -->
      <div class="sidebar-rem-section">
        <div class="sidebar-rem-head">
          <span class="sidebar-label">Lembretes</span>
          <button class="sidebar-rem-new-btn" onclick="toggleSidebarRemForm()" title="Novo lembrete">+</button>
        </div>
        <div class="sidebar-rem-form" id="d-rem-form" style="display:none">
          <input type="text" id="d-rem-text" class="sidebar-rem-input" placeholder="Lembrete…">
          <input type="datetime-local" id="d-rem-when" class="sidebar-rem-input" style="margin-top:5px">
          <select id="d-rem-advance" class="sidebar-rem-input" style="margin-top:5px">
            <option value="0">Na hora</option>
            <option value="15">15 min antes</option>
            <option value="60" selected>1 hora antes</option>
            <option value="720">12h antes</option>
            <option value="1440">1 dia antes</option>
            <option value="10080">1 semana antes</option>
          </select>
          <select id="d-rem-recur" class="sidebar-rem-input" style="margin-top:5px">
            <option value="">Não repetir</option>
            <option value="daily">Todo dia</option>
            <option value="weekly">Toda semana</option>
            <option value="monthly">Todo mês</option>
          </select>
          <div style="display:flex;gap:5px;margin-top:6px">
            <button class="sidebar-rem-cancel" onclick="toggleSidebarRemForm()">Cancelar</button>
            <button class="sidebar-rem-save" onclick="saveReminder('d')">Salvar</button>
          </div>
        </div>
        <div id="d-rem-list"></div>
      </div>

    </div>
  </div>

</div>

<!-- ══════════ MOBILE ══════════ -->
<div class="mobile" id="mobile-layout" style="display:none">
  <div class="m-drawer-bg" id="m-drawer-bg" onclick="closeDrawer()"></div>
  <div class="m-drawer" id="m-drawer">
    <div class="m-drawer-header">
      <div class="logo-mark" style="width:26px;height:26px;font-size:13px">⌘</div>
      <div><div class="logo-text" style="font-size:14px">FlowBoard</div></div>
      <div class="sync-dot" id="m-sync-dot" style="margin-left:auto"></div>
    </div>
    <div class="m-drawer-section">
      <div class="m-drawer-label">Quadros</div>
      <div id="m-boards-list"></div>
      <button class="m-board-item" style="color:var(--text3);font-size:13px;font-weight:600;border:1.5px dashed var(--border2);margin-top:4px;border-radius:10px;width:100%;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;" onclick="openBoardModal();closeDrawer()">+ Novo quadro</button>
    </div>
    <div class="m-drawer-bottom">
      <button class="m-drawer-action" onclick="openQuickAdd();closeDrawer()">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M13 2 3 14h7l-1 8 10-12h-7z"/></svg>
        Entrada rápida
      </button>
      <button class="m-drawer-action" onclick="exportBackupJSON();closeDrawer()">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Backup JSON
      </button>
      <button class="m-drawer-action" onclick="triggerImportBackup();closeDrawer()">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        Restaurar JSON
      </button>
      <button class="m-drawer-action" onclick="exportXLSX();closeDrawer()">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M3 15h18M9 3v18"/></svg>
        Exportar Excel
      </button>
    </div>
  </div>

  <div class="m-header">
    <button class="m-menu-btn" onclick="openDrawer()" aria-label="Abrir menu" aria-expanded="false" id="m-menu-btn">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
    <span class="m-title" id="m-board-title">FlowBoard</span>
    <button class="m-add-btn" onclick="openModal()">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    </button>
  </div>

  <div id="m-col-tabs-wrap">
    <div class="m-col-tabs" id="m-col-tabs"></div>
  </div>

  <div class="m-search-bar" id="m-search-bar" style="display:none">
    <div class="m-search-wrap">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input class="m-search-input" id="m-search" type="text" placeholder="Buscar tarefas…" oninput="renderM()">
    </div>
  </div>

  <div id="m-main-content" style="flex:1;overflow:hidden;display:flex;flex-direction:column;">
    <div id="m-kanban-view" style="flex:1;overflow:hidden;">
      <div class="m-board-wrap">
        <div class="m-board" id="m-board" onscroll="onMBoardScroll()"></div>
      </div>
    </div>
    <div id="m-notes-view" class="obsd-mobile" style="flex:1;overflow:hidden;display:none;flex-direction:column;">
      <div class="obsd-m-toolbar">
        <input id="m-notes-search" placeholder="🔍 Buscar…" oninput="onNotesSearch(this.value)">
        <select id="m-notes-scope" onchange="setNoteScope(this.value)">
          <option value="all">Todas</option>
          <option value="board">Quadro</option>
          <option value="global">Globais</option>
        </select>
        <button onclick="createNote()" title="Nova">+</button>
      </div>
      <div class="obsd-m-tree" id="m-notes-tree"></div>
      <div class="obsd-m-editor" id="m-notes-editor" style="display:none;"></div>
    </div>
    <div id="m-stats-view" style="display:none;" class="m-stats">
      <div class="m-stats-grid" id="m-stats-grid"></div>
      <div class="m-chart"><div class="m-chart-title">Concluídas — 7 dias</div><div class="chart-bars" id="m-weekly-bars"></div></div>
      <div class="m-chart"><div class="m-chart-title">Prioridade</div><div class="pri-dist" id="m-pri-dist"></div></div>
    </div>
    <div id="m-today-view" style="display:none;flex:1;overflow-y:auto;padding:12px 14px;">
      <div id="m-today-content"></div>
    </div>
    <div id="m-reminders-view" style="display:none;flex:1;overflow-y:auto;padding:14px;flex-direction:column;gap:12px;">
      <div class="rem-add-form">
        <input type="text" id="m-rem-text" placeholder="Novo lembrete para este quadro…">
        <div><label class="rem-field-label">Data e hora</label>
          <input type="datetime-local" id="m-rem-when" class="rem-field-input">
        </div>
        <div><label class="rem-field-label">Notificar</label>
          <select id="m-rem-advance" class="rem-field-input">
            <option value="0">Na hora</option>
            <option value="15">15 min antes</option>
            <option value="60" selected>1 hora antes</option>
            <option value="720">12 horas antes</option>
            <option value="1440">1 dia antes</option>
            <option value="10080">1 semana antes</option>
          </select>
        </div>
        <div><label class="rem-field-label">Repetir</label>
          <select id="m-rem-recur" class="rem-field-input">
            <option value="">Não repetir</option>
            <option value="daily">Todo dia</option>
            <option value="weekly">Toda semana</option>
            <option value="monthly">Todo mês</option>
          </select>
        </div>
        <button class="rem-save-btn" onclick="saveReminder('m')">+ Adicionar lembrete</button>
      </div>
      <div id="m-rem-list"></div>
    </div>
  </div>

  <div class="m-bottom-bar">
    <button class="m-bot-btn active" id="m-btn-kanban" onclick="setMView('kanban')">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="5" height="18" rx="1"/><rect x="10" y="3" width="5" height="12" rx="1"/><rect x="17" y="3" width="4" height="16" rx="1"/></svg>
      <span>Kanban</span>
    </button>
    <button class="m-bot-btn" id="m-btn-notes" onclick="setMView('notes')">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="8" y1="13" x2="16" y2="13"/><line x1="8" y1="17" x2="13" y2="17"/></svg>
      <span>Anotações</span>
    </button>
    <button class="m-bot-btn" id="m-btn-stats" onclick="setMView('stats')">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      <span>Stats</span>
    </button>
    <button class="m-bot-btn" id="m-btn-reminders" onclick="setMView('reminders')">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
      <span>Lembretes</span>
    </button>
    <button class="m-bot-btn" id="m-btn-today" onclick="setMView('today')">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/><polyline points="9 14 11 16 15 12"/></svg>
      <span>Meu Dia</span>
    </button>
  </div>
</div>

<!-- MODAL — Nova/Editar Tarefa -->
<div class="modal-bg" id="modal" role="dialog" aria-modal="true" aria-labelledby="modal-htitle-text" style="display:none" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-head">
      <div class="modal-htitle"><div class="modal-hmark"></div><span id="modal-htitle-text">Nova tarefa</span></div>
      <button class="modal-close" onclick="closeModal()" aria-label="Fechar modal">✕</button>
    </div>
    <div class="frow"><label>Título *</label><input id="f-title" type="text" placeholder="O que precisa ser feito?"></div>
    <div class="fgrid2">
      <div class="frow"><label>Coluna</label><select id="f-col"></select></div>
      <div class="frow"><label>Prioridade</label>
        <select id="f-priority"><option value="alta">🔴 Alta</option><option value="media" selected>🟡 Média</option><option value="baixa">🟢 Baixa</option></select>
      </div>
    </div>
    <div class="fgrid2">
      <div class="frow">
        <label>Responsáveis</label>
        <div class="tags-box" id="assignee-box" onclick="document.getElementById('assignee-input').focus()">
          <input id="assignee-input" type="text" placeholder="Enter para add…" onkeydown="handleAssigneeKey(event)" list="assignee-suggestions" autocomplete="off">
          <datalist id="assignee-suggestions"></datalist>
        </div>
      </div>
      <div class="frow"><label>Esforço</label>
        <select id="f-effort"><option value="">—</option><option value="PP">PP (Muito pequeno)</option><option value="P">P (Pequeno)</option><option value="M">M (Médio)</option><option value="G">G (Grande)</option><option value="GG">GG (Muito grande)</option></select>
      </div>
    </div>
    <div class="frow"><label>Data limite</label><input id="f-due" type="date"></div>
    <div class="frow">
      <label>Etiquetas</label>
      <div class="tags-box" id="tags-box" onclick="document.getElementById('tag-input').focus()">
        <input id="tag-input" type="text" placeholder="Enter para adicionar…" onkeydown="handleTagKey(event)" list="tag-suggestions" autocomplete="off">
        <datalist id="tag-suggestions"></datalist>
      </div>
    </div>
    <div class="frow">
      <label>Checklist</label>
      <div class="checklist-editor" id="checklist-editor"></div>
      <button class="add-check-btn" type="button" onclick="addCheckItem()">+ Adicionar item</button>
    </div>
    <div class="frow"><label>Notas</label><textarea id="f-notes" placeholder="Detalhes, links…"></textarea></div>

    <div class="frow" id="dep-row">
      <label>Depende de</label>
      <select class="dep-select" id="f-dep-select" onchange="addDep(this.value);this.value=''">
        <option value="">— Selecionar tarefa —</option>
      </select>
      <div class="dep-list" id="dep-list"></div>
    </div>
    <div class="frow" id="history-row" style="display:none">
      <label>Histórico</label>
      <div class="modal-history" id="modal-history"></div>
    </div>
    <div class="modal-foot">
      <div style="display:flex; gap:8px; flex-wrap:wrap; margin-right:auto">
        <button class="mbt mbt-delete" id="modal-delete-btn" onclick="modalDeleteCard()" aria-label="Excluir tarefa" style="display:none">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
          Excluir
        </button>
        <button class="mbt mbt-sec" id="modal-dup-btn" onclick="modalDuplicateCard()" style="display:none">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> Duplicar
        </button>
        <button class="mbt mbt-sec" id="modal-rem-btn" onclick="modalCreateReminder()" style="display:none">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg> Criar Lembrete
        </button>
      </div>
      <button class="mbt mbt-cancel" onclick="closeModal()">Cancelar</button>
      <button class="mbt mbt-save" onclick="saveCard()">Salvar tarefa</button>
    </div>
  </div>
</div>

<!-- MODAL — Novo Quadro -->
<div class="modal-bg" id="board-modal" style="display:none" onclick="if(event.target===this)closeBoardModal()">
  <div class="modal" style="max-width:340px">
    <div class="modal-handle"></div>
    <div class="modal-head">
      <div class="modal-htitle"><div class="modal-hmark"></div>Novo quadro</div>
      <button class="modal-close" onclick="closeBoardModal()">✕</button>
    </div>
    <div class="frow"><label>Nome</label><input id="bm-name" type="text" placeholder="Ex: Trabalho, Estudos…"></div>
    <div class="frow"><label>Cor</label><div class="color-swatches" id="color-swatches"></div></div>
    <div class="modal-foot">
      <button class="mbt mbt-cancel" onclick="closeBoardModal()">Cancelar</button>
      <button class="mbt mbt-save" onclick="saveBoardModal()">Criar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"><div class="toast-dot" id="toast-dot"></div><span id="toast-msg"></span><button class="toast-undo" id="toast-undo" style="display:none" onclick="executeUndo()">Desfazer</button><div class="toast-progress" id="toast-progress"></div></div>

<!-- MODAL — Confirm customizado -->
<div class="modal-bg cdialog-bg" id="cdialog-confirm" style="display:none" onclick="if(event.target===this)resolveDialog(false)">
  <div class="modal" style="max-width:380px">
    <div class="modal-handle"></div>
    <div class="modal-head">
      <div class="modal-htitle"><div class="modal-hmark" style="background:var(--red);box-shadow:0 0 10px rgba(239,68,68,0.3)"></div><span id="cdialog-confirm-title">Confirmar</span></div>
      <button class="modal-close" onclick="resolveDialog(false)">✕</button>
    </div>
    <div class="cdialog-body" id="cdialog-confirm-msg"></div>
    <div class="modal-foot">
      <button class="mbt mbt-cancel" onclick="resolveDialog(false)">Cancelar</button>
      <button class="mbt mbt-delete" style="display:flex" onclick="resolveDialog(true)">Confirmar</button>
    </div>
  </div>
</div>

<!-- MODAL — Prompt customizado -->
<div class="modal-bg cdialog-bg" id="cdialog-prompt" style="display:none" onclick="if(event.target===this)resolveDialog(null)">
  <div class="modal" style="max-width:380px">
    <div class="modal-handle"></div>
    <div class="modal-head">
      <div class="modal-htitle"><div class="modal-hmark"></div><span id="cdialog-prompt-title">Entrada</span></div>
      <button class="modal-close" onclick="resolveDialog(null)">✕</button>
    </div>
    <div class="cdialog-body" id="cdialog-prompt-msg"></div>
    <div class="frow" style="margin-top:12px"><input id="cdialog-prompt-input" type="text" placeholder="" onkeydown="if(event.key==='Enter')resolveDialog(this.value)"></div>
    <div class="modal-foot">
      <button class="mbt mbt-cancel" onclick="resolveDialog(null)">Cancelar</button>
      <button class="mbt mbt-save" onclick="resolveDialog(document.getElementById('cdialog-prompt-input').value)">OK</button>
    </div>
  </div>
</div>
<div class="notif-overlay" id="notif-overlay"></div>
<input id="backup-import-input" type="file" accept="application/json,.json" style="display:none" onchange="importBackupJSON(event)">
